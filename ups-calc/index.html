<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPS 備援時間計算工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-100 min-h-screen py-8 px-4"><div class="fixed top-4 left-4 z-50"><img src="/websites/logo_backgroundl.png" class="h-12 w-auto rounded shadow-sm" alt="Logo"></div><a href="/websites/" class="fixed top-4 right-4 z-50 bg-white px-4 py-2 rounded-full shadow-md text-sm font-semibold text-slate-600 hover:bg-slate-100 transition-all border border-slate-200">← 返回首頁</a>
    <div class="max-w-2xl mx-auto">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-slate-800 mb-2">🔋 UPS 備援時間計算機</h1>
            <p class="text-slate-600">估算不間斷電源電池維持時間</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Input Section -->
            <div class="glass p-6 rounded-2xl shadow-sm border border-slate-200 space-y-6">
                <h2 class="text-lg font-semibold text-slate-700 border-b pb-2 mb-4">輸入參數</h2>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-600 mb-1">交流電壓 (V)</label>
                        <input type="number" id="voltage" value="220" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-600 mb-1">交流電流 (A)</label>
                        <input type="number" id="current" value="0.3" step="0.01" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-600 mb-1">功率因數 (PF)</label>
                        <input type="number" id="pf" value="0.8" step="0.1" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-600 mb-1">UPS 效率 (%)</label>
                        <input type="number" id="efficiency" value="85" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                </div>

                <div class="space-y-4 pt-4 border-t">
                    <h3 class="text-sm font-semibold text-slate-500 uppercase">電池規格</h3>
                    <div class="grid grid-cols-3 gap-3">
                        <div>
                            <label class="block text-xs text-slate-500 mb-1">電壓 (V)</label>
                            <input type="number" id="bat_v" value="12" class="w-full p-2 border rounded-lg text-sm">
                        </div>
                        <div>
                            <label class="block text-xs text-slate-500 mb-1">容量 (Ah)</label>
                            <input type="number" id="bat_ah" value="9" class="w-full p-2 border rounded-lg text-sm">
                        </div>
                        <div>
                            <label class="block text-xs text-slate-500 mb-1">數量 (pcs)</label>
                            <input type="number" id="bat_count" value="2" class="w-full p-2 border rounded-lg text-sm">
                        </div>
                    </div>
                </div>

                <div class="pt-4">
                    <div class="flex justify-between mb-2">
                        <label class="text-sm font-medium text-slate-600">電池健康度 (SOH)</label>
                        <span id="soh_val" class="text-sm font-bold text-blue-600">100%</span>
                    </div>
                    <input type="range" id="soh" min="50" max="100" value="100" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-blue-600">
                    <div class="flex justify-between text-xs text-slate-400 mt-1">
                        <span>50% (老化)</span>
                        <span>100% (全新)</span>
                    </div>
                </div>
            </div>

            <!-- Result Section -->
            <div class="flex flex-col gap-6">
                <div class="glass p-8 rounded-2xl shadow-sm border border-slate-200 text-center flex flex-col justify-center items-center">
                    <h2 class="text-slate-500 font-medium mb-4">預估備援時間</h2>
                    <div id="result_main" class="text-5xl font-black text-blue-600 mb-2">--</div>
                    <div id="result_sub" class="text-slate-500 text-lg">請輸入參數</div>
                </div>

                <div class="glass p-6 rounded-2xl shadow-sm border border-slate-200">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-sm font-semibold text-slate-700">負載比例 (上限 900W)</h3>
                        <span id="load_percent" class="text-sm font-bold text-slate-600">0%</span>
                    </div>
                    <div class="w-full bg-slate-200 rounded-full h-4 overflow-hidden">
                        <div id="load_bar" class="bg-blue-500 h-full transition-all duration-500" style="width: 0%"></div>
                    </div>
                    <div class="mt-4 grid grid-cols-2 gap-2 text-xs text-slate-500">
                        <div>負載功率: <span id="calc_power" class="font-semibold">0</span> W</div>
                        <div>可用電池能量 (DoD 90%): <span id="calc_energy" class="font-semibold">0</span> Wh</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const inputs = ['voltage', 'current', 'pf', 'efficiency', 'bat_v', 'bat_ah', 'bat_count', 'soh'];
        
        function calculate() {
            const v = parseFloat(document.getElementById('voltage').value) || 0;
            const i = parseFloat(document.getElementById('current').value) || 0;
            const pf = parseFloat(document.getElementById('pf').value) || 0;
            const eff = (parseFloat(document.getElementById('efficiency').value) || 0) / 100;
            const bv = parseFloat(document.getElementById('bat_v').value) || 0;
            const bah = parseFloat(document.getElementById('bat_ah').value) || 0;
            const bc = parseFloat(document.getElementById('bat_count').value) || 0;
            const soh = (parseFloat(document.getElementById('soh').value) || 0) / 100;
            
            document.getElementById('soh_val').innerText = (soh * 100).toFixed(0) + '%';

            // 計算邏輯
            const loadPower = v * i * pf;
            const dod = 0.9; // 放電深度 (Depth of Discharge) 預設 90% 以保護電池
            const totalEnergy = bv * bc * bah * dod * soh;
            const selfConsumption = 15; // 固定 15W 自耗電
            
            // 考慮效率的實際需求功率
            // 實際需求功率 = (負載功率 / 逆變器效率) + 設備自耗電
            const totalPowerDemand = (loadPower / (eff || 0.85)) + selfConsumption;
            
            let minutes = 0;
            if (totalPowerDemand > 0) {
                minutes = (totalEnergy / totalPowerDemand) * 60;
            }

            // 更新結果
            if (minutes > 0 && isFinite(minutes)) {
                const h = Math.floor(minutes / 60);
                const m = Math.round(minutes % 60);
                document.getElementById('result_main').innerText = Math.round(minutes) + ' 分鐘';
                document.getElementById('result_sub').innerText = h > 0 ? `${h} 小時 ${m} 分鐘` : `${m} 分鐘`;
            } else {
                document.getElementById('result_main').innerText = '--';
                document.getElementById('result_sub').innerText = '計算結果異常';
            }

            // 更新負載比例
            const loadLimit = 900;
            const percent = Math.min((loadPower / loadLimit) * 100, 100);
            document.getElementById('load_bar').style.width = percent + '%';
            document.getElementById('load_percent').innerText = percent.toFixed(1) + '%';
            document.getElementById('calc_power').innerText = loadPower.toFixed(1);
            document.getElementById('calc_energy').innerText = totalEnergy.toFixed(1);
            
            // 顏色變換
            const bar = document.getElementById('load_bar');
            if (percent > 80) bar.className = 'bg-red-500 h-full transition-all duration-500';
            else if (percent > 50) bar.className = 'bg-yellow-500 h-full transition-all duration-500';
            else bar.className = 'bg-blue-500 h-full transition-all duration-500';
        }

        inputs.forEach(id => {
            document.getElementById(id).addEventListener('input', calculate);
        });

        calculate();
    </script>
</body>
</html>
